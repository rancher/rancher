name: '{{ .k8s.manifest }}'
pipelineid: '{{ .k8s.pipelineid }}'
dependson:
  - 'go-generate'

sources:
  rancher-go-mod-k8s:
    name: 'Get K8s <major>.<minor> version in go.mod'
    kind: golang/gomod
    scmid: 'default'
    spec:
      module: 'k8s.io/kubernetes'
    transformers:
      - find: 'v\d+\.\d+'

  k8s-release:
    name: 'Get latest upstream K8s patch version for {{ source "rancher-go-mod-k8s" }}'
    kind: githubrelease
    dependson:
      - 'rancher-go-mod-k8s'
    disablesourceinput: true
    spec:
      owner: '{{ .repos.k8s.owner }}'
      repository: '{{ .repos.k8s.repo }}'
      key: tagname
      typefilter:
        release: true
      username: '{{ .scm.username }}'
      token: '{{ requiredEnv .scm.token }}'
      versionfilter:
        kind: semver
        pattern: '~{{ source "rancher-go-mod-k8s" }}'

  get-sha256-kubectl-amd64:
    name: 'Get the sha256sum of Kubectl for {{ source "k8s-release" }} for amd64'
    kind: shell
    disablesourceinput: true
    spec:
      command: 'wget -t 3 -T 300 https://dl.k8s.io/{{source "k8s-release" }}/bin/linux/amd64/kubectl && sha256sum kubectl && rm kubectl'
    transformers:
      - find: '\S+'

  get-sha256-kubectl-arm64:
    name: 'Get the sha256sum of Kubectl for {{ source "k8s-release" }} for arm64'
    kind: shell
    disablesourceinput: true
    spec:
      command: 'wget -t 3 -T 300 https://dl.k8s.io/{{source "k8s-release" }}/bin/linux/arm64/kubectl && sha256sum kubectl && rm kubectl'
    transformers:
      - find: '\S+'

conditions:
  check-dockerfile-kubectl-version:
    name: 'Check if ENV|ARG KUBECTL_VERSION is set in Dockerfiles'
    kind: file
    scmid: 'default'
    disablesourceinput: true
    spec:
      files:
        - 'package/Dockerfile'
        - 'tests/validation/Dockerfile.rke'
        - 'tests/validation/Dockerfile.v3api'
      matchpattern: '(?:ENV|ARG)[\s\t]+KUBECTL_VERSION[=\s]\S+'

  check-shell-script-kubectl-version:
    name: 'Check if KUBECTL_VERSION is set in shell scripts'
    kind: file
    scmid: 'default'
    disablesourceinput: true
    spec:
      files:
        - 'tests/validation/tests/rke/scripts/build.sh'
        - 'tests/validation/tests/v3_api/scripts/build.sh'
      matchpattern: 'KUBECTL_VERSION="\${KUBECTL_VERSION:-\S+}"'

targets:
  update-dockerfile-kubectl-version:
    name: 'Update ENV|ARG KUBECTL_VERSION to {{ source "k8s-release" }} in Dockerfiles'
    kind: file
    scmid: 'default'
    disablesourceinput: true
    spec:
      files:
        - 'package/Dockerfile'
        - 'tests/validation/Dockerfile.rke'
        - 'tests/validation/Dockerfile.v3api'
      matchpattern: '(ENV|ARG)[\s\t]+KUBECTL_VERSION[=\s]\S+'
      replacepattern: '$1 KUBECTL_VERSION={{ source "k8s-release" }}'

  update-shell-script-kubectl-version:
    name: 'Update KUBECTL_VERSION to {{ source "k8s-release" }} in shell scripts'
    kind: file
    scmid: 'default'
    disablesourceinput: true
    spec:
      files:
        - 'tests/validation/tests/rke/scripts/build.sh'
        - 'tests/validation/tests/v3_api/scripts/build.sh'
      matchpattern: 'KUBECTL_VERSION="\${KUBECTL_VERSION:-\S+}"'
      replacepattern: 'KUBECTL_VERSION="${KUBECTL_VERSION:-{{ source "k8s-release" }}}"'

  update-kubectl-sha256-amd64:
    name: 'Update the sha256sum of Kubectl for amd64 in Dockerfiles'
    kind: file
    scmid: 'default'
    disablesourceinput: true
    spec:
      files:
        - 'package/Dockerfile'
      matchpattern: '(ENV|ARG)[\s\t]+KUBECTL_CHECKSUM_amd64[=\s]\S+'
      replacepattern: '$1 KUBECTL_CHECKSUM_amd64={{ source "get-sha256-kubectl-amd64" }}'

  update-kubectl-sha256-arm64:
    name: 'Update the sha256sum of Kubectl for arm64 in Dockerfiles'
    kind: file
    scmid: 'default'
    disablesourceinput: true
    spec:
      files:
        - 'package/Dockerfile'
      matchpattern: '(ENV|ARG)[\s\t]+KUBECTL_CHECKSUM_arm64[=\s]\S+'
      replacepattern: '$1 KUBECTL_CHECKSUM_arm64={{ source "get-sha256-kubectl-arm64" }}'
