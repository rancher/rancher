# This is a partial file (prefixed with _) that allows to reuse the scm and
# action configurations.

scms:
  default:
    kind: github
    spec:
      owner: '{{ .scm.owner }}'
      repository: '{{ .scm.repo }}'
      branch: '{{ .scm.branch }}'
      user: '{{ .scm.user }}'
      email: '{{ .scm.email }}'
      username: '{{ .scm.username }}'
      token: '{{ requiredEnv .scm.token }}'
      commitusingapi: {{ .scm.commitusingapi }}
      commitmessage:
        squash: {{ .scm.commitmessage.squash }}
        type: '{{ .k3s.commitmessage.type }}'
        scope: '{{ .k3s.commitmessage.scope }}'
        title: 'Bump patch versions of K3s {{ source "k3s-release" }}'
        body: 'Bump patch versions of K3s {{ source "k3s-release" }}'

actions:
  rancher-pr:
    kind: github/pullrequest
    scmid: 'default'
    spec:
      labels:
        - 'dependencies'
      reviewers:
        - 'rancher/rancher-team-2-hostbusters-dev'
        - 'rancher/rancher-security'
      mergemethod: '{{ .scm.mergemethod }}'
      title: '[{{ .scm.branch }}] Bump K3s patch version {{ source "k3s-release" }}'
      description: 'Bump patch versions of K3s {{ source "k3s-release" }}'
