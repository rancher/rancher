name: Update KDM Branch
on:
  workflow_dispatch:
    inputs:
      kdm_branch:
        type: choice
        description: "New KDM branch value"
        options:
          - dev-v2.12
          - release-v2.12

permissions: {}

jobs:
  update-kdm-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      TARGET_BRANCH: ${{ github.ref_name }}
      NEW_KDM_BRANCH: ${{ inputs.kdm_branch }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Update KDM branch references
        run: |
          sed -i "s|ENV CATTLE_KDM_BRANCH=.*|ENV CATTLE_KDM_BRANCH=${NEW_KDM_BRANCH}|" Dockerfile.runtime
          sed -i "s|ARG CATTLE_KDM_BRANCH=.*|ARG CATTLE_KDM_BRANCH=${NEW_KDM_BRANCH}|" package/Dockerfile
          sed -i "s|\(KDMBranch[^=]*= NewSetting(\"kdm-branch\", \"\)[^\"]*\"|\1${NEW_KDM_BRANCH}\"|" pkg/settings/setting.go
          sed -i "s|kontainer-driver-metadata/[^/]*/data/data.json|kontainer-driver-metadata/${NEW_KDM_BRANCH}/data/data.json|g" scripts/gha/tests
          sed -i "s|kontainer-driver-metadata/[^/]*/data/data.json|kontainer-driver-metadata/${NEW_KDM_BRANCH}/data/data.json|g" scripts/provisioning-tests
          sed -i "s|kontainer-driver-metadata/[^/]*/data/data.json|kontainer-driver-metadata/${NEW_KDM_BRANCH}/data/data.json|g" scripts/test

      - name: Check for repository changes
        id: changes
        run: |
          if git diff --name-only --exit-code; then
            echo "No changes found in repository after updating KDM branch"
            echo "changes_exist=false" >> $GITHUB_OUTPUT
          else
            echo "Changes found in repository after updating KDM branch:"
            git diff --name-only
            echo "changes_exist=true" >> $GITHUB_OUTPUT
          fi

      - name: Create branch, commit and push
        if: ${{ steps.changes.outputs.changes_exist == 'true' }}
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="githubaction-update-kdm-branch-$(date +%Y-%m-%d-%H-%M-%S)"
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          gh auth setup-git
          git checkout -b "${BRANCH}"
          git commit -a -m "Update KDM branch to ${NEW_KDM_BRANCH}"
          git push origin "${BRANCH}"

      - name: Read App Secrets
        if: ${{ steps.changes.outputs.changes_exist == 'true' }}
        uses: rancher-eio/read-vault-secrets@0da85151ad1f19ed7986c41587e45aac1ace74b6 # v3
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/github/app-credentials appId | APP_ID ;
            secret/data/github/repo/${{ github.repository }}/github/app-credentials privateKey | PRIVATE_KEY

      - name: Create App Token
        if: ${{ steps.changes.outputs.changes_exist == 'true' }}
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.PRIVATE_KEY }}
          permission-pull-requests: write

      - name: Create Pull Request
        if: ${{ steps.changes.outputs.changes_exist == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          PR_URL=$(gh pr create \
            --title "[${TARGET_BRANCH}] Update KDM branch to ${NEW_KDM_BRANCH}" \
            --body "Auto-generated by GitHub Actions" \
            --base "${TARGET_BRANCH}" \
            --head "${SOURCE_BRANCH}" \
            --label "status/auto-created")
          
          echo "Pull Request URL - ${PR_URL}"
          echo "::notice file=.github/workflows/update-kdm-branch.yml,line=1,col=1::Pull Request URL - ${PR_URL}"
