name: Update KDM Branch
on:
  workflow_dispatch:
    inputs:
      kdm_branch:
        type: string
        description: "New KDM branch value (e.g., dev-v2.14, release-v2.14)"
        required: true
      target_branch:
        type: string
        description: "Target branch for the PR"
        default: 'main'

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update-kdm-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.target_branch }}

      - name: Update KDM branch references
        run: |
          NEW_KDM_BRANCH="${{ inputs.kdm_branch }}"

          sed -i "s|ENV CATTLE_KDM_BRANCH=.*|ENV CATTLE_KDM_BRANCH=${NEW_KDM_BRANCH}|" Dockerfile.dapper
          sed -i "s|ARG CATTLE_KDM_BRANCH=.*|ARG CATTLE_KDM_BRANCH=${NEW_KDM_BRANCH}|" package/Dockerfile
          sed -i "s|\(KDMBranch[^=]*= NewSetting(\"kdm-branch\", \"\)[^\"]*\"|\1${NEW_KDM_BRANCH}\"|" pkg/settings/setting.go
          sed -i "s|kontainer-driver-metadata/[^/]*/data/data.json|kontainer-driver-metadata/${NEW_KDM_BRANCH}/data/data.json|g" scripts/gha/tests
          sed -i "s|kontainer-driver-metadata/[^/]*/data/data.json|kontainer-driver-metadata/${NEW_KDM_BRANCH}/data/data.json|g" scripts/provisioning-tests
          sed -i "s|kontainer-driver-metadata/[^/]*/data/data.json|kontainer-driver-metadata/${NEW_KDM_BRANCH}/data/data.json|g" scripts/test

      - name: Check for repository changes
        run: |
          if git diff --name-only --exit-code; then
            echo "No changes found in repository after updating KDM branch"
            echo "changes_exist=false" >> $GITHUB_ENV
          else
            echo "Changes found in repository after updating KDM branch:"
            git diff --name-only
            echo "changes_exist=true" >> $GITHUB_ENV
          fi

      - name: Create branch, commit and push
        if: ${{ env.changes_exist == 'true' }}
        id: branch
        run: |
          BRANCH="githubaction-update-kdm-branch-$(date +%Y-%m-%d-%H-%M-%S)"
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git checkout -b "${BRANCH}"
          git commit -a -m "Update KDM branch to ${{ inputs.kdm_branch }}"
          git push origin "${BRANCH}"

      - name: Read App Secrets
        if: ${{ env.changes_exist == 'true' }}
        uses: rancher-eio/read-vault-secrets@main
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/github/app-credentials appId | APP_ID ;
            secret/data/github/repo/${{ github.repository }}/github/app-credentials privateKey | PRIVATE_KEY

      - name: Create App Token
        if: ${{ env.changes_exist == 'true' }}
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.10.1
        id: app-token
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.PRIVATE_KEY }}

      - name: Create Pull Request
        if: ${{ env.changes_exist == 'true' }}
        id: cpr
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          SOURCE_BRANCH: ${{ steps.branch.outputs.branch }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { data: pr } = await github.rest.pulls.create({
              title: `[${{ inputs.target_branch }}] Update KDM branch to ${{ inputs.kdm_branch }}`,
              body: 'Auto-generated by GitHub Actions',
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: "${{ inputs.target_branch }}",
              head: `${process.env.SOURCE_BRANCH}`
            });
            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: pr.number,
              labels: ["status/auto-created"],
            });
            console.log('Created new pull request');
            return pr.html_url;

      - name: Check outputs
        if: ${{ env.changes_exist == 'true' }}
        run: |
          echo "Pull Request URL - ${{ steps.cpr.outputs.result }}"
          echo "::notice file=.github/workflows/update-kdm-branch.yml,line=1,col=1::Pull Request URL - ${{ steps.cpr.outputs.result }}"
