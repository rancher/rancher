name: Verify generated code changes

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
    - 'release/*'

permissions:
  contents: read
  id-token: none

env:
  GOARCH: amd64
  CGO_ENABLED: 0
  SETUP_GO_VERSION: '1.26.*'

jobs:
  check-changes:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4.4.0
        with:
          go-version: ${{ env.SETUP_GO_VERSION }}
          cache: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }} # zizmor: ignore[cache-poisoning] -- test-only dependency cache; release workflows are separate.
      - uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3.5.0
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        # zizmor: ignore[cache-poisoning] -- test-only dependency cache; release workflows are separate.
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      -
        name: Verify go.mod status
        run: ./.github/scripts/check-for-go-mod-changes.sh
      -
        name: Verify auto-generated changes
        run: ./.github/scripts/check-for-auto-generated-changes.sh
