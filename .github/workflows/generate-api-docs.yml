name: Docs stuff
on:
  workflow_call:
    inputs:
      parent_run_id:
        type: string
        description: "parent run_id to download images from"
        required: true
permissions: {}
env:
  TAG: v2.12-${{ github.sha }}-head
  GIT_TAG: v2.12-${{ github.sha }}-head
  HOST_ARCH: amd64
  ARCH: amd64
  PYTHON_VERSION: '3.11'
  GOLANG_VERSION: '1.23'
  IMAGE: ${{ github.repository_owner }}/rancher
  IMAGE_AGENT: ${{ github.repository_owner }}/rancher-agent
  REPO: ${{ github.repository_owner }}
jobs:
  test:
    runs-on:
      - runs-on
      - spot=false
      - runner=16cpu-linux-x64
      - run-id=${{ github.run_id }}
    timeout-minutes: 60
    env:
      K3D_VERSION: v5.7.1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure Docker for cgroupfs
        run: |
          echo '{"exec-opts": ["native.cgroupdriver=cgroupfs"]}'| sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - name: Setup Environment Variables
        uses: ./.github/actions/setup-tag-env
      - id: env
        name: Setup Dependencies Env Variables
        uses: ./.github/actions/setup-build-env
      - name: Download Docker images artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.parent_run_id }}
          github-token: ${{ github.token }}
          path: "/tmp"
          merge-multiple: true
      - name: Update dependencies
        run: sudo apt-get update
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GOLANG_VERSION }}"
      - name: Generate API docs
        shell: bash
        run: |
          image_server_id=$(docker load --input /tmp/rancher-linux-amd64.tar 2>&1 | grep "Loaded image" | awk '{print $NF}')
          if [ -z "$image_server_id" ]; then
            echo "Error: Failed to load image from tarball!"
            exit 1
          fi
          go install github.com/tomleb/rancher-crd-swagger@236ff9f29c511116cff4736f11aa81cd12941f73
          rancher-crd-swagger -i "$image_server_id" -f ./public-api.txt -p 9998 -t 9999 -o docs.json
      - name: Upload api docs
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: ./docs.json
          if-no-files-found: error
          retention-days: 4
          overwrite: true
