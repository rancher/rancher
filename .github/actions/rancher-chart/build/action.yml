name: "Setup and build chart"
description: "Install dependencies, pull files and build the Rancher chart"
runs:
  using: "composite"
  steps:
    - name: install dependencies
      shell: bash
      run: zypper install -y aws-cli
    - name: Setup Tag Env Variables
      uses: ./.github/actions/setup-tag-env
    - id: env
      name: Setup Dependencies Env Variables
      uses: ./.github/actions/setup-build-env
    - name: Install Helm dependencies
      env:
         HELM_UNITTEST_VERSION: ${{ steps.env.outputs.HELM_UNITTEST_VERSION }}
      shell: bash
      run: |
        # Add repo and packages made by Rancher in OBS.
        RUN zypper addrepo --refresh https://download.opensuse.org/repositories/isv:/Rancher:/dependencies/pkgs rancher-obs-deps && \
        zypper --gpg-auto-import-keys refresh --force && \
        zypper -n in --from rancher-obs-deps helm yq
        helm plugin install https://github.com/helm-unittest/helm-unittest.git --version ${HELM_UNITTEST_VERSION} --verify=false;
    - name: Build
      shell: bash
      run: ./scripts/chart/build chart
    - name: Validate
      shell: bash
      run: ./scripts/chart/validate
    - name: Test
      shell: bash
      run: ./scripts/chart/test
    - name: Package
      shell: bash
      run: ./scripts/chart/package
