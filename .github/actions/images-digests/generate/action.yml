name: "Generate images digests"
description: "Setup and generate images digests"
runs:
  using: "composite"
  steps:
    - name: install dependencies
      shell: bash
      run: zypper install -y aws-cli jq awk
    - name: Create base dir
      shell: bash
      run: mkdir -p "${ARTIFACTS_BASE_DIR}" /tmp/images-files
    - name: Download Docker images artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: /tmp/images-files
        merge-multiple: true
        pattern: "*-images.txt"
    - name: Setup Environment Variables
      uses: ./.github/actions/setup-tag-env
    - name: Setup ecm-distro-tools
      uses: rancher/ecm-distro-tools@dcb7716af5a318567115a231643164e1d8446021 # v0.67.2
    - name: Generate linux docker digests
      shell: bash
      run: |
        release generate rancher docker-images-digests --config "{}" --registry "${REGISTRY}" --images-list "$(paste -sd, /tmp/images-files/rancher-images.txt)" --output-file "$ARTIFACTS_BASE_DIR/$LINUX_FILE"
    - name: Generate windows docker digests
      shell: bash
      run: |
        release generate rancher docker-images-digests --config "{}" --registry "${REGISTRY}" --images-list "$(paste -sd, /tmp/images-files/rancher-windows-images.txt)" --output-file "$ARTIFACTS_BASE_DIR/$WINDOWS_FILE"
    - name: Generate sha256sum file
      shell: bash
      env:
        ARTIFACTS_TYPE: "digests"
      run: scripts/artifacts-hashes.sh
